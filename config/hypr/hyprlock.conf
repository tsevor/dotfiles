general {
	disable_loading_bar = true
	hide_cursor = true
	no_fade_in = false
}

background {
	path = ~/.config/hypr/lock.png
	blur_passes = 3
	blur_size = 7
}

input-field {
	monitor = DP-1
	size = 500, 100
	outline_thickness = 3
	dots_size = 0.3
	dots_spacing = 0.2
	dots_center = true
	outer_color = rgb(151515)
	inner_color = rgb(151515)
	font_color = rgb(e0e0e0)
	fade_on_empty = true
	placeholder_text = <span></span>
	hide_input = false
	rounding = -1
	check_color = rgb(338866)
	fail_color = rgb(883333)
	fail_text = <span></span>
	fail_transition = 300
	capslock_color = rgb(222211)
	numlock_color = rgb(221122)
}
