<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
	<alias>
		<family>sans-serif</family>
		<prefer>
			<family>Noto Sans</family>
			<family>Noto Sans Symbols2</family>
			<family>Noto Sans Symbols</family>
			<family>Noto Color Emoji</family>
			<family>OverpassM Nerd Font</family>
		</prefer>
	</alias>

	<alias>
		<family>serif</family>
		<prefer>
			<family>Noto Serif</family>
			<family>Noto Serif Symbols2</family>
			<family>Noto Serif Symbols</family>
			<family>Noto Color Emoji</family>
			<family>OverpassM Nerd Font</family>
		</prefer>
	</alias>

	<alias>
		<family>monospace</family>
		<prefer>
			<family>OverpassM Nerd Font</family>
			<family>Noto Sans Symbols2</family>
			<family>Noto Sans Symbols</family>
			<family>Noto Color Emoji</family>
			<family>Noto Sans Mono</family>
		</prefer>
	</alias>

	<alias>
	<family>ui-monospace</family>
	<prefer><family>monospace</family></prefer>
	</alias>

	<alias>
	<family>system-ui-monospace</family>
	<prefer><family>monospace</family></prefer>
	</alias>

	<alias>
	<family>Fixed</family>
	<prefer><family>monospace</family></prefer>
	</alias>
</fontconfig>
