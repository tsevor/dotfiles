binds {
	scroll_event_delay = 0
}

bind = SUPER, T, exec, alacritty
bind = SUPER, E, exec, pcmanfm
bind = SUPER, R, exec, pkill wofi || wofi --show drun
bind = SUPER, B, exec, zen-browser
bind = SUPER, D, exec, equicord
bind = SUPER, G, exec, steam
bind = SUPER, M, exec, spotify-launcher

bind = SUPER, S, exec, hyprshot -m region
bind = SUPER SHIFT, S, exec, hyprshot -o /home/trevor/Pictures -f toimmy.png -m region; immy /home/trevor/Pictures/toimmy.png


bind = SUPER, Q, killactive,
bind = SUPER CTRL, Q, forcekillactive,
bind = SUPER, L, exec, hyprlock
bind = SUPER CTRL ALT, Q, exit,
bind = SUPER CTRL ALT, ESCAPE, exec, shutdown now
bind = SUPER, ESCAPE, exec, pkill wofi || ~/.config/hypr/scripts/powermenu.sh

bind = SUPER, F, fullscreen
bind = SUPER, V, togglefloating,
bind = SUPER, P, pseudo, # dwindle
bind = SUPER, J, togglesplit, # dwindle

# zoom
bind = SUPER, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(echo $(hyprctl getoption cursor:zoom_factor | head -1 | cut -d' ' -f2) + 0.2 | bc); hyprctl keyword cursor:invisible 1
bind = SUPER, mouse_up,   exec, hyprctl keyword cursor:zoom_factor 1; hyprctl keyword cursor:invisible 0

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Move windows with mainMod + arrow keys
bind = SUPER ALT, left, movewindow, l
bind = SUPER ALT, right, movewindow, r
bind = SUPER ALT, up, movewindow, u
bind = SUPER ALT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER ALT, 1, movetoworkspace, 1
bind = SUPER ALT, 2, movetoworkspace, 2
bind = SUPER ALT, 3, movetoworkspace, 3
bind = SUPER ALT, 4, movetoworkspace, 4
bind = SUPER ALT, 5, movetoworkspace, 5
bind = SUPER ALT, 6, movetoworkspace, 6
bind = SUPER ALT, 7, movetoworkspace, 7
bind = SUPER ALT, 8, movetoworkspace, 8
bind = SUPER ALT, 9, movetoworkspace, 9
bind = SUPER ALT, 0, movetoworkspace, 10

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bindl = , XF86PowerOff, exec, systemctl poweroff